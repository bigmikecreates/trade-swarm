<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trade-Swarm Lab{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: #161b22; border-bottom: 1px solid #30363d; padding: 15px 0; margin-bottom: 30px; }
        header .container { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        h1 { color: #58a6ff; font-size: 24px; }
        h2 { color: #c9d1d9; font-size: 20px; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        nav a { color: #8b949e; text-decoration: none; margin-left: 20px; }
        nav a:hover, nav a.active { color: #58a6ff; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: #58a6ff; }
        .stat-label { color: #8b949e; font-size: 14px; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }
        th { background: #21262d; color: #8b949e; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        tr:hover { background: #21262d; }
        .status-completed { color: #3fb950; }
        .status-running { color: #d29922; }
        .status-failed { color: #f85149; }
        .positive { color: #3fb950; }
        .negative { color: #f85149; }
        .btn { display: inline-block; padding: 8px 16px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #2ea043; }
        .btn-secondary { background: #21262d; border: 1px solid #30363d; }
        .btn-secondary:hover { background: #30363d; }
        select, input { padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; }
        .nav-links { display: flex; gap: 10px; }
        .nav-links a { padding: 8px 16px; background: #21262d; border-radius: 6px; }
        footer { text-align: center; padding: 20px; color: #8b949e; border-top: 1px solid #30363d; margin-top: 40px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1>📈 Trade-Swarm Agent Laboratory</h1>
            <nav>
                <a href="{{ url_for('overview') }}" {% if request.endpoint == 'overview' %}class="active"{% endif %}>Overview</a>
                <a href="{{ url_for('experiments') }}" {% if request.endpoint == 'experiments' %}class="active"{% endif %}>Experiments</a>
                <a href="{{ url_for('compare') }}" {% if request.endpoint == 'compare' %}class="active"{% endif %}>Compare</a>
                <a href="{{ url_for('trades') }}" {% if request.endpoint == 'trades' %}class="active"{% endif %}>Trades</a>
                <a href="{{ url_for('signals') }}" {% if request.endpoint == 'signals' %}class="active"{% endif %}>Signals</a>
                <a href="{{ url_for('agents') }}" {% if request.endpoint == 'agents' %}class="active"{% endif %}>Agents</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <p>Trade-Swarm Agent Laboratory — {% block footer %}Powered by Flask{% endblock %}</p>
    </footer>
</body>
</html>
